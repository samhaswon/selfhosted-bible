version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "dev"
    cooldown:
      default-days: 5
      semver-major-days: 10
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
